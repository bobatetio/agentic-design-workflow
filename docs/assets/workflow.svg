<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Inter, Arial, sans-serif">
  <rect width="1200" height="520" fill="#0D0D0D"/>
  <text x="600" y="48" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="700">TokScript V3 — Agentic Design-to-Code Workflow</text>
  <text x="600" y="78" text-anchor="middle" fill="#B6B6B6" font-size="14">Figma intent becomes governed production code without a static handoff</text>

  <!-- Mode A band -->
  <rect x="40" y="110" width="1120" height="92" rx="16" fill="#0A0A0A" stroke="#2E2E30"/>
  <text x="64" y="138" fill="#00B8B2" font-size="13" font-weight="700">MODE A · EXPLORATION (in Figma)</text>
  <text x="64" y="166" fill="#B6B6B6" font-size="13">Whole-page passes to find the shape, sections, and rhythm — then refine. Output: a finalized Figma + agreed section list.</text>
  <text x="64" y="186" fill="#6B7280" font-size="12">Not production code.</text>

  <!-- Mode B title -->
  <text x="64" y="246" fill="#00B8B2" font-size="13" font-weight="700">MODE B · PRODUCTION (one section at a time)</text>

  <!-- Pipeline boxes -->
  <!-- 1 Figma -->
  <rect x="40" y="266" width="180" height="120" rx="16" fill="#1C1C1C" stroke="#2E2E30"/>
  <text x="130" y="312" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">Figma</text>
  <text x="130" y="338" text-anchor="middle" fill="#B6B6B6" font-size="12">Refined section</text>
  <text x="130" y="356" text-anchor="middle" fill="#B6B6B6" font-size="12">design</text>

  <!-- arrow -->
  <path d="M228 326 L286 326" stroke="#00B8B2" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="257" y="316" text-anchor="middle" fill="#6B7280" font-size="11">MCP</text>

  <!-- 2 Claude Code -->
  <rect x="294" y="266" width="200" height="120" rx="16" fill="#1C1C1C" stroke="#00B8B2"/>
  <text x="394" y="306" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">Claude Code</text>
  <text x="394" y="330" text-anchor="middle" fill="#B6B6B6" font-size="12">in VS Code</text>
  <text x="394" y="352" text-anchor="middle" fill="#B6B6B6" font-size="12">reads CLAUDE.md</text>
  <text x="394" y="370" text-anchor="middle" fill="#B6B6B6" font-size="12">+ Skills</text>

  <!-- arrow -->
  <path d="M502 326 L560 326" stroke="#00B8B2" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 3 Gate -->
  <rect x="568" y="266" width="200" height="120" rx="16" fill="#1C1C1C" stroke="#2E2E30"/>
  <text x="668" y="306" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">design-review</text>
  <text x="668" y="330" text-anchor="middle" fill="#B6B6B6" font-size="12">the GATE</text>
  <text x="668" y="352" text-anchor="middle" fill="#B6B6B6" font-size="12">per-section,</text>
  <text x="668" y="370" text-anchor="middle" fill="#B6B6B6" font-size="12">non-negotiable</text>

  <!-- arrow -->
  <path d="M776 326 L834 326" stroke="#00B8B2" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 4 Bob branch -->
  <rect x="842" y="266" width="150" height="120" rx="16" fill="#1C1C1C" stroke="#2E2E30"/>
  <text x="917" y="312" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">Bob branch</text>
  <text x="917" y="338" text-anchor="middle" fill="#B6B6B6" font-size="12">batched push</text>
  <text x="917" y="356" text-anchor="middle" fill="#6B7280" font-size="11">handoff point</text>

  <!-- arrow dashed to dev -->
  <path d="M1000 326 L1058 326" stroke="#6B7280" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#b)"/>

  <!-- 5 Dev team -->
  <rect x="1066" y="266" width="94" height="120" rx="16" fill="#0A0A0A" stroke="#2E2E30"/>
  <text x="1113" y="318" text-anchor="middle" fill="#B6B6B6" font-size="13" font-weight="700">Dev</text>
  <text x="1113" y="338" text-anchor="middle" fill="#B6B6B6" font-size="13" font-weight="700">team</text>
  <text x="1113" y="358" text-anchor="middle" fill="#6B7280" font-size="10">owns downstream</text>

  <!-- loop-back arrow from gate down to Claude Code -->
  <path d="M628 388 L628 420 L394 420 L394 390" fill="none" stroke="#DA2626" stroke-width="2" marker-end="url(#c)"/>
  <text x="511" y="438" text-anchor="middle" fill="#DA2626" font-size="11">FAIL → fix → re-run</text>

  <!-- footnote -->
  <text x="40" y="486" fill="#6B7280" font-size="12">Governance: CLAUDE.md (constitution) · .claude/skills/ (design-to-code · component-builder · design-review) · .claude/git-workflow.md (dev team)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#00B8B2"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6B7280"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#DA2626"/></marker>
  </defs>
</svg>
